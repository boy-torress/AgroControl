# ─── Gradle JVM / Daemon ──────────────────────────────────────────────────────
# Aumenta el heap del daemon de Gradle (fix para OutOfMemoryError: Java heap space)
org.gradle.jvmargs=-Xmx6g -Xms1g -XX:MaxMetaspaceSize=1g -XX:+UseG1GC -Dfile.encoding=UTF-8

# ─── Rendimiento ──────────────────────────────────────────────────────────────
org.gradle.daemon=true
org.gradle.parallel=false
org.gradle.caching=true
org.gradle.configureondemand=false

# ─── Android ──────────────────────────────────────────────────────────────────
android.useAndroidX=true
android.enableJetifier=false
# En AGP 8.x el DEX usa el classpath completo para dexing — mejora compatibilidad
android.useFullClasspathForDexingTransform=true

# ─── Kotlin ───────────────────────────────────────────────────────────────────
kotlin.daemon.jvm.options=-Xmx3g -Xms512m -XX:+UseG1GC
kotlin.incremental=true
